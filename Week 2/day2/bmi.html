<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta id="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator</title>
</head>
<body>
  <h1>BMI Calculator</h1>
  
  <label for="weight">Weight (kg):</label>
  <input type="number" id = "weight" step = "0.1" placeholder="Enter weight in kg"><br><br>
  
  <label for="height">Height (m):</label>
  <input type="number" id = "height" step = "0.01" placeholder="Enter height in meters"><br><br>
  
  <button onclick="calculateBMI()">Calculate BMI</button>
  
  <h2 id="result">Your BMI will appear here</h2>
  <h3 id="category"></h3>
  
  <script>
    function calculateBMI() {
      const weight = parseFloat(document.querySelector("#weight").value);
      const height = parseFloat(document.querySelector("#height").value);
      
      if (!weight || !height || height <= 0) {
        document.querySelector("#result").innerText = "Please enter valid values.";
        document.querySelector("#category").innerText = "";
        return;
      }
      
      const bmi = weight / (height * height);
      document.querySelector("#result").innerText = "Your BMI is: " + bmi.toFixed(2);
      
      if (bmi <= 18.5) {
        document.querySelector("#category").innerText = "Category: Underweight";
      } else if (bmi >= 18.6 && bmi <= 24) {
        document.querySelector("#category").innerText = "Category: Normal Weight";
      } else if (bmi >= 25 && bmi <= 29.9) {
        document.querySelector("#category").innerText = "Category: Overweight";
      } else if (bmi >= 30) {
        document.querySelector("#category").innerText = "Category: Obese";
      }
    }
  </script>
</body>
</html>
